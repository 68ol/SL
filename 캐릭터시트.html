<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMAGE VIEWER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Bebas+Neue&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --border: #2a2a2a;
    --accent: #e8d5b0;
    --dim: #555;
    --white: #f0ece4;
  }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.25em;
    color: var(--accent);
  }
  .counter {
    font-size: 0.7rem;
    color: var(--dim);
    letter-spacing: 0.15em;
  }

  .stage {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: grab;
  }
  .stage.dragging { cursor: grabbing; }

  .track {
    display: flex;
    height: 100%;
    width: 1200%;
    transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
    will-change: transform;
  }

  .slide {
    width: 8.3333%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }

  .img-wrap {
    width: calc(100% - 48px);
    height: calc(100% - 48px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .img-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
    animation: fadeIn 0.35s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:scale(0.97); } to { opacity:1; transform:scale(1); } }

  .slide-num {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    pointer-events: none;
  }

  footer {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 16px 32px;
    border-top: 1px solid var(--border);
  }

  .btn-nav {
    background: none;
    border: 1px solid var(--border);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    padding: 9px 24px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-nav:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .btn-nav:disabled { opacity: 0.2; cursor: default; }

  .dots {
    display: flex;
    gap: 7px;
    align-items: center;
  }
  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s, transform 0.3s;
    cursor: pointer;
  }
  .dot.active { background: var(--accent); transform: scale(1.5); }

  .btn-bgm {
    position: fixed;
    top: 14px;
    right: 32px;
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    padding: 6px 14px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    z-index: 100;
  }
  .btn-bgm:hover { opacity: 0.7; }
  .btn-bgm.off { border-color: var(--border); color: var(--dim); }

  .hint {
    position: fixed;
    bottom: 72px;
    right: 22px;
    font-size: 0.58rem;
    color: var(--dim);
    letter-spacing: 0.08em;
    line-height: 2;
    text-align: right;
    pointer-events: none;
    opacity: 0.5;
  }
</style>
</head>
<body>

<audio id="bgm" loop src="https://raw.githubusercontent.com/68ol/SL/refs/heads/main/First%20Day%20Jitters.mp3"></audio>

<header>
  <h1>IMAGE VIEWER</h1>
  <span class="counter" id="counterLabel">01 / 12</span>
</header>

<button class="btn-bgm" id="btnBgm" onclick="toggleBgm()">■ BGM</button>

<div class="stage" id="stage">
  <div class="track" id="track"></div>
</div>

<footer>
  <button class="btn-nav" id="btnPrev" onclick="go(-1)" disabled>← PREV</button>
  <div class="dots" id="dots"></div>
  <button class="btn-nav" id="btnNext" onclick="go(1)">NEXT →</button>
</footer>

<div class="hint">← → 키로 이동<br>드래그·스와이프로 넘기기</div>

<script>
  const TOTAL = 12;
  const BASE  = 'https://raw.githubusercontent.com/68ol/SL/refs/heads/main/';

  const track  = document.getElementById('track');
  const dotsEl = document.getElementById('dots');

  for (let i = 0; i < TOTAL; i++) {
    const imgNum = i + 2;

    const slide = document.createElement('div');
    slide.className = 'slide';

    const wrap = document.createElement('div');
    wrap.className = 'img-wrap';

    const img = document.createElement('img');
    img.src     = BASE + imgNum + '.png';
    img.alt     = imgNum + '.png';
    img.loading = i < 3 ? 'eager' : 'lazy';

    wrap.appendChild(img);
    slide.appendChild(wrap);

    const label = document.createElement('span');
    label.className   = 'slide-num';
    label.textContent = String(i + 1).padStart(2, '0');
    slide.appendChild(label);

    track.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', (idx => () => jumpTo(idx))(i));
    dotsEl.appendChild(dot);
  }

  // ── 슬라이더 ──
  let current = 0;
  const btnPrev      = document.getElementById('btnPrev');
  const btnNext      = document.getElementById('btnNext');
  const counterLabel = document.getElementById('counterLabel');

  function getDots() { return document.querySelectorAll('.dot'); }

  function go(dir) {
    const next = current + dir;
    if (next < 0 || next >= TOTAL) return;
    current = next;
    render();
  }
  function jumpTo(idx) { current = idx; render(); }
  function render() {
    track.style.transform = `translateX(-${current * (100 / TOTAL)}%)`;
    getDots().forEach((d, i) => d.classList.toggle('active', i === current));
    btnPrev.disabled = current === 0;
    btnNext.disabled = current === TOTAL - 1;
    counterLabel.textContent = String(current + 1).padStart(2,'0') + ' / ' + String(TOTAL).padStart(2,'0');
  }

  // ── BGM (기본 ON) ──
  const bgm    = document.getElementById('bgm');
  const btnBgm = document.getElementById('btnBgm');
  let playing  = false;

  function tryAutoplay() {
    bgm.play().then(() => {
      playing = true;
      btnBgm.textContent = '■ BGM';
      btnBgm.classList.remove('off');
    }).catch(() => {
      playing = false;
      btnBgm.textContent = '♪ BGM';
      btnBgm.classList.add('off');
    });
    document.removeEventListener('click', tryAutoplay);
    document.removeEventListener('keydown', tryAutoplay);
    document.removeEventListener('touchstart', tryAutoplay);
  }

  bgm.play().then(() => {
    playing = true;
  }).catch(() => {
    btnBgm.textContent = '♪ BGM';
    btnBgm.classList.add('off');
    document.addEventListener('click', tryAutoplay);
    document.addEventListener('keydown', tryAutoplay);
    document.addEventListener('touchstart', tryAutoplay);
  });

  function toggleBgm() {
    if (playing) {
      bgm.pause();
      playing = false;
      btnBgm.textContent = '♪ BGM';
      btnBgm.classList.add('off');
    } else {
      bgm.play();
      playing = true;
      btnBgm.textContent = '■ BGM';
      btnBgm.classList.remove('off');
    }
  }

  // ── 드래그 ──
  const stage = document.getElementById('stage');
  let startX = null;
  stage.addEventListener('mousedown', e => { startX = e.clientX; stage.classList.add('dragging'); });
  window.addEventListener('mouseup', e => {
    if (startX === null) return;
    const dx = e.clientX - startX;
    if (Math.abs(dx) > 60) go(dx < 0 ? 1 : -1);
    startX = null;
    stage.classList.remove('dragging');
  });
  stage.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  stage.addEventListener('touchend', e => {
    if (startX === null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 60) go(dx < 0 ? 1 : -1);
    startX = null;
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') go(-1);
    if (e.key === 'ArrowRight') go(1);
  });
</script>
</body>
</html>
